<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GenericBR - Redirect</title>
    <script>
      // Captura o caminho completo que o usuário tentou acessar
      var originalPath = window.location.pathname + window.location.search + window.location.hash;
      // Redireciona para a página principal, passando o caminho original como parâmetro "path"
      window.location.replace('/index.html?path=' + encodeURIComponent(originalPath));
    </script>
  </head>
  <body></body>
</html>
