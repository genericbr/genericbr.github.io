<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - GenericBR</title>

  <!-- Arquivo de configuração (dados pessoais, jogos iniciais, etc.) -->
  <script src="config.js"></script>

  <!-- CSS externo (estilos separados para melhor organização) -->
  <link rel="stylesheet" href="dashboard.css">

  <!-- Fontes do Google -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <h1>🎛️ Admin Dashboard</h1>

  <!-- ==================== TELA DE LOGIN ==================== -->
  <div id="login-section" class="card login-card">
    <h2>Login</h2>
    <input type="password" id="admin-password" placeholder="Senha">
    <button id="login-btn">Entrar</button>
    <div id="login-error" class="status" style="color: #e53935;"></div>
  </div>

  <!-- ==================== CONTEÚDO ADMIN (aparece após login) ==================== -->
  <div id="admin-content" style="display: none;">
    <!-- Abas -->
    <div class="tabs">
      <div class="tab active" data-tab="music">🎵 Músicas (letras + tags)</div>
      <div class="tab" data-tab="games">🎮 Jogos (gerenciar + tags + imagem de crédito + detalhes)</div>
    </div>

    <!-- Aba: Músicas -->
    <div id="music-tab" class="tab-content active">
      <button id="refresh-playlist-btn" class="refresh-btn">🔄 Forçar atualização da playlist (cache)</button>
      <div id="music-list" class="music-grid">
        <div class="state">
          <div class="spinner"></div>
          Carregando músicas...
        </div>
      </div>
    </div>

    <!-- Aba: Jogos -->
    <div id="games-tab" class="tab-content">
      <button id="add-game-btn" class="add-game-btn">➕ Adicionar novo jogo</button>
      <div id="games-list" class="games-grid">
        <div class="state">
          <div class="spinner"></div>
          Carregando jogos...
        </div>
      </div>
    </div>
  </div>

  <div class="footer">GenericBR Admin · Alterações salvas via Cloudflare KV</div>
</div>

<script>
  // ------------------------------------------------------------------
  // 1. Configurações globais
  // ------------------------------------------------------------------
  const WORKER_URL = 'https://portfolio.genericbr-business.workers.dev';
  let authToken = null;

  // ------------------------------------------------------------------
  // 2. Funções auxiliares (escape HTML)
  // ------------------------------------------------------------------
  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
  }

  // ------------------------------------------------------------------
  // 3. Login e persistência do token
  // ------------------------------------------------------------------
  document.getElementById('login-btn').onclick = async () => {
    const pwd = document.getElementById('admin-password').value;
    try {
      const res = await fetch(`${WORKER_URL}/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        authToken = data.token;
        localStorage.setItem('adminToken', authToken);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadMusicData();
        loadGamesData();
      } else {
        document.getElementById('login-error').innerText = data.error || 'Falha no login';
      }
    } catch (e) {
      document.getElementById('login-error').innerText = 'Erro de rede';
    }
  };

  (async () => {
    const saved = localStorage.getItem('adminToken');
    if (saved) {
      try {
        const res = await fetch(`${WORKER_URL}/auth/check`, {
          headers: { 'Authorization': `Bearer ${saved}` }
        });
        if (res.ok) {
          authToken = saved;
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('admin-content').style.display = 'block';
          loadMusicData();
          loadGamesData();
        } else {
          localStorage.removeItem('adminToken');
        }
      } catch (e) {}
    }
  })();

  // ------------------------------------------------------------------
  // 4. Abas
  // ------------------------------------------------------------------
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
    };
  });

  // ------------------------------------------------------------------
  // 5. Refresh da playlist (cache do YouTube)
  // ------------------------------------------------------------------
  document.getElementById('refresh-playlist-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('refresh-playlist-btn');
    const orig = btn.innerText;
    btn.innerText = '🔄 Atualizando...';
    btn.disabled = true;
    try {
      const res = await fetch(`${WORKER_URL}/refresh`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        alert('Cache limpo!');
        await loadMusicData();
      } else {
        alert('Erro ao limpar cache');
      }
    } catch (e) {
      alert('Erro de rede');
    } finally {
      btn.innerText = orig;
      btn.disabled = false;
    }
  });

  // ------------------------------------------------------------------
  // 6. Músicas (listar, adicionar tags, editar letras)
  // ------------------------------------------------------------------
  async function loadMusicData() {
    const container = document.getElementById('music-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando músicas...</div>';
    try {
      const res = await fetch(`${WORKER_URL}?admin=true`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      const videos = await res.json();
      if (!videos.length) {
        container.innerHTML = '<div class="state">Nenhuma música encontrada.</div>';
        return;
      }
      container.innerHTML = '';
      for (const v of videos) {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
          <img class="music-thumb" src="${escapeHtml(v.thumbnail)}" alt="${escapeHtml(v.title)}" loading="lazy">
          <div class="music-info">
            <div class="music-title">${escapeHtml(v.title)}</div>
            <div class="tags-area" id="tags-${v.id}">
              ${(v.tags || []).map(t => `
                <span class="tag" style="background: ${t.color || 'rgba(255,255,255,0.08)'}">
                  ${escapeHtml(t.name || t)}
                  <button onclick="removeTag('${v.id}', 'music', '${escapeHtml(t.name || t)}')">✖</button>
                </span>
              `).join('')}
            </div>
            <div class="tag-input">
              <input type="text" placeholder="Nova tag" id="newtag-${v.id}">
              <button onclick="addTag('${v.id}', 'music')">+</button>
            </div>
            <div class="preset-tags">
              <div class="preset-btn" onclick="addPresetTag('${v.id}', 'music', 'Volunteer', 'rgba(245,158,11,0.2)')">Volunteer</div>
              <div class="preset-btn" onclick="addPresetTag('${v.id}', 'music', 'Localizer', 'rgba(0,168,107,0.2)')">Localizer</div>
              <div class="preset-btn" onclick="addPresetTag('${v.id}', 'music', 'Reviewer', 'rgba(229,57,53,0.2)')">Reviewer</div>
              <div class="preset-btn" onclick="showCustomTagInput('${v.id}', 'music')">Custom</div>
            </div>
            <div id="custom-tag-${v.id}" style="display: none;" class="custom-tag-row">
              <input type="text" placeholder="Tag name" id="custom-name-${v.id}">
              <input type="color" id="custom-color-${v.id}" value="#6b7194">
              <button onclick="addCustomTag('${v.id}', 'music')">Add</button>
            </div>
            <div><strong>Letra / Tradução</strong></div>
            <textarea id="lyrics-${v.id}" class="lyrics-box" rows="4">${escapeHtml(v.lyrics || '')}</textarea>
            <button class="save-btn" onclick="saveLyrics('${v.id}')">Salvar letra</button>
            <div class="status" id="status-${v.id}"></div>
          </div>
        `;
        container.appendChild(card);
      }
    } catch (e) {
      container.innerHTML = `<div class="state">Erro: ${e.message}</div>`;
    }
  }

  window.saveLyrics = async (id) => {
    const lyrics = document.getElementById(`lyrics-${id}`).value;
    const statusDiv = document.getElementById(`status-${id}`);
    statusDiv.innerText = 'Salvando...';
    try {
      const res = await fetch(`${WORKER_URL}/api/music/lyrics`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id, lyrics })
      });
      if (res.ok) {
        statusDiv.innerText = '✅ Salvo!';
        setTimeout(() => statusDiv.innerText = '', 2000);
      } else {
        statusDiv.innerText = '❌ Erro';
      }
    } catch (e) {
      statusDiv.innerText = '❌ Rede';
    }
  };

  // ------------------------------------------------------------------
  // 7. Jogos (listar, editar, excluir, tags, créditos)
  // ------------------------------------------------------------------
  async function loadGamesData() {
    const container = document.getElementById('games-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando jogos...</div>';
    try {
      const res = await fetch(`${WORKER_URL}/api/games?admin=true`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      const games = await res.json();
      if (!games.length) {
        container.innerHTML = '<div class="state">Nenhum jogo. Clique em "Adicionar novo jogo".</div>';
        return;
      }
      container.innerHTML = '';
      for (const game of games) {
        // Buscar tags e créditos atuais
        const tagsRes = await fetch(`${WORKER_URL}/api/games/tags?id=${game.appId}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        }).then(r => r.json()).catch(() => ({ tags: [] }));
        const creditsRes = await fetch(`${WORKER_URL}/api/game/credits?id=${game.appId}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        }).then(r => r.json()).catch(() => ({ creditsImage: '', creditsChips: [] }));

        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <div class="game-info">
            <div class="game-name">${escapeHtml(game.name)} (${game.appId})</div>
            <div><strong>Role:</strong> <input type="text" id="role-${game.appId}" value="${escapeHtml(game.role || '')}"></div>
            <div><strong>Developer:</strong> <input type="text" id="dev-${game.appId}" value="${escapeHtml(game.dev || '')}"></div>
            <div><strong>Release date (YYYY-MM-DD):</strong> <input type="text" id="release-${game.appId}" value="${escapeHtml(game.releaseDate || '')}" placeholder="2024-01-15"></div>
            <div><strong>Original language:</strong> <input type="text" id="lang-${game.appId}" value="${escapeHtml(game.originalLanguage || 'English')}"></div>
            <div><strong>Note (optional):</strong> <input type="text" id="note-${game.appId}" value="${escapeHtml(game.note || '')}"></div>
            <div><strong>Description:</strong> <textarea id="desc-${game.appId}" rows="2">${escapeHtml(game.description || '')}</textarea></div>
            <div><strong>Cover image URL:</strong> <input type="text" id="cover-${game.appId}" value="${escapeHtml(game.cover || '')}" placeholder="https://..."></div>
            <div><strong>Screenshots (URLs, one per line):</strong> <textarea id="screenshots-${game.appId}" rows="2">${(game.screenshots || []).join('\n')}</textarea></div>
            <div><strong>Credits (name and role, one per line, format: Name|Role):</strong> <textarea id="creditsChips-${game.appId}" rows="3">${(creditsRes.creditsChips || []).map(c => `${c.name}|${c.role || ''}`).join('\n')}</textarea></div>
            <div><strong>Imagem de crédito (URL, opcional - se for imagem única):</strong> <input type="text" id="creditsImage-${game.appId}" value="${escapeHtml(creditsRes.creditsImage || '')}" placeholder="https://exemplo.com/prova.jpg"></div>
            <div class="tags-area" id="tags-${game.appId}">
              ${(tagsRes.tags || []).map(t => `
                <span class="tag" style="background: ${t.color || 'rgba(255,255,255,0.08)'}">
                  ${escapeHtml(t.name || t)}
                  <button onclick="removeTag('${game.appId}', 'game', '${escapeHtml(t.name || t)}')">✖</button>
                </span>
              `).join('')}
            </div>
            <div class="tag-input">
              <input type="text" placeholder="Nova tag" id="newtag-${game.appId}">
              <button onclick="addTag('${game.appId}', 'game')">+</button>
            </div>
            <div class="preset-tags">
              <div class="preset-btn" onclick="addPresetTag('${game.appId}', 'game', 'Volunteer', 'rgba(245,158,11,0.2)')">Volunteer</div>
              <div class="preset-btn" onclick="addPresetTag('${game.appId}', 'game', 'Localizer', 'rgba(0,168,107,0.2)')">Localizer</div>
              <div class="preset-btn" onclick="addPresetTag('${game.appId}', 'game', 'Reviewer', 'rgba(229,57,53,0.2)')">Reviewer</div>
              <div class="preset-btn" onclick="showCustomTagInput('${game.appId}', 'game')">Custom</div>
            </div>
            <div id="custom-tag-${game.appId}" style="display: none;" class="custom-tag-row">
              <input type="text" placeholder="Tag name" id="custom-name-${game.appId}">
              <input type="color" id="custom-color-${game.appId}" value="#6b7194">
              <button onclick="addCustomTag('${game.appId}', 'game')">Add</button>
            </div>
            <button class="save-btn" onclick="saveGameData('${game.appId}')">Salvar alterações</button>
            <button class="save-btn btn-danger" style="margin-top: 0.3rem;" onclick="deleteGame('${game.appId}')">Excluir jogo</button>
            <div class="status" id="status-${game.appId}"></div>
          </div>
        `;
        container.appendChild(card);
      }
    } catch (e) {
      container.innerHTML = `<div class="state">Erro: ${e.message}</div>`;
    }
  }

  window.saveGameData = async (appId) => {
    const statusDiv = document.getElementById(`status-${appId}`);
    statusDiv.innerText = 'Salvando...';
    const gameData = {
      appId,
      name: document.querySelector(`#games-list .game-card .game-name`)?.innerText.split(' (')[0] || appId,
      role: document.getElementById(`role-${appId}`).value,
      dev: document.getElementById(`dev-${appId}`).value,
      releaseDate: document.getElementById(`release-${appId}`).value,
      originalLanguage: document.getElementById(`lang-${appId}`).value,
      note: document.getElementById(`note-${appId}`).value,
      description: document.getElementById(`desc-${appId}`).value,
      cover: document.getElementById(`cover-${appId}`).value,
      screenshots: document.getElementById(`screenshots-${appId}`).value.split('\n').filter(l => l.trim()),
    };
    try {
      const res = await fetch(`${WORKER_URL}/api/games`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify(gameData)
      });
      if (!res.ok) throw new Error();
      // Salvar créditos estruturados e imagem de crédito
      const creditsChips = document.getElementById(`creditsChips-${appId}`).value.split('\n').filter(l => l.trim()).map(line => {
        const [name, role] = line.split('|');
        return { name: name.trim(), role: role ? role.trim() : '' };
      });
      const creditsImage = document.getElementById(`creditsImage-${appId}`).value;
      await fetch(`${WORKER_URL}/api/game/credits`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id: appId, creditsImage, creditsChips })
      });
      statusDiv.innerText = '✅ Salvo!';
      setTimeout(() => statusDiv.innerText = '', 2000);
    } catch (e) {
      statusDiv.innerText = '❌ Erro';
    }
  };

  window.deleteGame = async (appId) => {
    if (!confirm(`Excluir jogo ${appId}?`)) return;
    const statusDiv = document.getElementById(`status-${appId}`);
    statusDiv.innerText = 'Excluindo...';
    try {
      const res = await fetch(`${WORKER_URL}/api/games?appId=${appId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        loadGamesData();
      } else {
        statusDiv.innerText = '❌ Erro';
      }
    } catch (e) {
      statusDiv.innerText = '❌ Rede';
    }
  };

  // Modal para adicionar novo jogo
  document.getElementById('add-game-btn')?.addEventListener('click', () => {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>Adicionar novo jogo</h3>
        <input type="text" id="new-appid" placeholder="App ID (ex: 4178020)">
        <input type="text" id="new-name" placeholder="Nome do jogo">
        <button id="confirm-add-game">Adicionar</button>
        <button id="cancel-add-game">Cancelar</button>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('confirm-add-game').onclick = async () => {
      const appId = document.getElementById('new-appid').value.trim();
      const name = document.getElementById('new-name').value.trim();
      if (!appId || !name) return alert('Preencha App ID e Nome');
      try {
        const res = await fetch(`${WORKER_URL}/api/games`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({
            appId, name, role: '', dev: '', releaseDate: '', originalLanguage: 'English',
            note: '', description: '', cover: '', screenshots: [], creditsChips: []
          })
        });
        if (res.ok) {
          modal.remove();
          loadGamesData();
        } else {
          alert('Erro ao adicionar');
        }
      } catch (e) {
        alert('Erro de rede');
      }
    };
    document.getElementById('cancel-add-game').onclick = () => modal.remove();
  });

  // ------------------------------------------------------------------
  // 8. Tags (presets, custom, adicionar, remover)
  // ------------------------------------------------------------------
  window.addPresetTag = async (id, type, name, color) => {
    await addTagObject(id, type, { name, color });
  };

  window.showCustomTagInput = (id, type) => {
    const div = document.getElementById(`custom-tag-${id}`);
    if (div) div.style.display = div.style.display === 'none' ? 'flex' : 'none';
  };

  window.addCustomTag = async (id, type) => {
    const name = document.getElementById(`custom-name-${id}`).value.trim();
    const color = document.getElementById(`custom-color-${id}`).value;
    if (!name) return;
    await addTagObject(id, type, { name, color });
    document.getElementById(`custom-name-${id}`).value = '';
    document.getElementById(`custom-tag-${id}`).style.display = 'none';
  };

  window.addTag = async (id, type) => {
    const input = document.getElementById(`newtag-${id}`);
    const tagName = input.value.trim();
    if (!tagName) return;
    await addTagObject(id, type, { name: tagName, color: 'rgba(255,255,255,0.08)' });
    input.value = '';
  };

  window.addTagObject = async (id, type, tagObj) => {
    const endpoint = type === 'music' ? '/api/music/tags' : '/api/games/tags';
    try {
      const res = await fetch(`${WORKER_URL}${endpoint}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id, tag: tagObj })
      });
      if (res.ok) {
        if (type === 'music') loadMusicData();
        else loadGamesData();
      } else {
        alert('Erro ao adicionar tag');
      }
    } catch (e) {
      alert('Rede');
    }
  };

  window.removeTag = async (id, type, tagName) => {
    const endpoint = type === 'music' ? '/api/music/tags' : '/api/games/tags';
    try {
      const res = await fetch(`${WORKER_URL}${endpoint}?id=${id}&tag=${encodeURIComponent(tagName)}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        if (type === 'music') loadMusicData();
        else loadGamesData();
      } else {
        alert('Erro ao remover tag');
      }
    } catch (e) {
      alert('Rede');
    }
  };
</script>
</body>
</html>
