<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - GenericBR</title>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f18;
      --surface: #161927;
      --card: #1c1f30;
      --border: rgba(255,255,255,0.07);
      --text: #e2e4ef;
      --muted: #6b7194;
      --em: #2979ff;
      --danger: #e53935;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }
    .login-card { max-width: 400px; margin: 2rem auto; text-align: center; }
    input, textarea, select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1rem;
      border-radius: 10px;
      width: 100%;
    }
    button {
      background: var(--em);
      border: none;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.15s;
    }
    button:hover { filter: brightness(1.1); }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--card);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      margin-right: 0.4rem;
      margin-bottom: 0.4rem;
      border: 1px solid var(--border);
    }
    .tag button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0;
      margin: 0;
      line-height: 1;
    }
    .tag button:hover { color: var(--danger); }
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      opacity: 0.7;
      font-weight: 500;
    }
    .tab.active { opacity: 1; border-bottom: 2px solid var(--em); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .music-grid, .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }
    .music-card, .game-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.15s;
    }
    .music-card:hover, .game-card:hover { transform: translateY(-3px); }
    .music-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .music-info, .game-info { padding: 1rem; }
    .music-title, .game-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .tags-area { margin: 0.5rem 0; display: flex; flex-wrap: wrap; align-items: center; }
    .tag-input { display: flex; gap: 0.5rem; margin: 0.5rem 0; }
    .lyrics-box, .credits-box {
      margin: 0.5rem 0;
      font-family: monospace;
      font-size: 0.8rem;
      resize: vertical;
    }
    .save-btn { background: #00a86b; width: 100%; margin-top: 0.5rem; }
    .status { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; text-align: center; }
    .refresh-btn { background: var(--muted); margin-bottom: 1rem; }
    .state { text-align: center; padding: 3rem; color: var(--muted); }
    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 2rem; }
  </style>
</head>
<body>
<div class="container">
  <h1 style="margin-bottom:1rem;">🎛️ Admin Dashboard</h1>

  <div id="login-section" class="card login-card">
    <h2 style="margin-bottom:1rem;">Login</h2>
    <input type="password" id="admin-password" placeholder="Senha" style="margin-bottom:1rem;">
    <button id="login-btn">Entrar</button>
    <div id="login-error" class="status" style="color:#e53935; margin-top:0.5rem;"></div>
  </div>

  <div id="admin-content" style="display:none;">
    <div class="tabs">
      <div class="tab active" data-tab="music">🎵 Músicas (letras + tags)</div>
      <div class="tab" data-tab="games">🎮 Jogos (créditos + tags)</div>
    </div>

    <div id="music-tab" class="tab-content active">
      <button id="refresh-playlist-btn" class="refresh-btn" style="margin-bottom:1rem;">🔄 Forçar atualização da playlist (cache)</button>
      <div id="music-list" class="music-grid">
        <div class="state"><div class="spinner"></div>Carregando músicas...</div>
      </div>
    </div>

    <div id="games-tab" class="tab-content">
      <div id="games-list" class="games-grid">
        <div class="state"><div class="spinner"></div>Carregando jogos...</div>
      </div>
    </div>
  </div>
  <div class="footer">GenericBR Admin · Alterações salvas via Cloudflare KV</div>
</div>

<script>
  const WORKER_URL = 'https://portfolio.genericbr-business.workers.dev';
  let authToken = null;

  // ---------- LOGIN ----------
  document.getElementById('login-btn').onclick = async () => {
    const password = document.getElementById('admin-password').value;
    try {
      const res = await fetch(`${WORKER_URL}/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        authToken = data.token;
        localStorage.setItem('adminToken', authToken);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadMusicData();
        loadGamesData();
      } else {
        document.getElementById('login-error').innerText = data.error || 'Falha no login';
      }
    } catch (err) {
      document.getElementById('login-error').innerText = 'Erro de rede';
    }
  };

  (async () => {
    const savedToken = localStorage.getItem('adminToken');
    if (savedToken) {
      try {
        const res = await fetch(`${WORKER_URL}/auth/check`, {
          headers: { 'Authorization': `Bearer ${savedToken}` }
        });
        if (res.ok) {
          authToken = savedToken;
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('admin-content').style.display = 'block';
          loadMusicData();
          loadGamesData();
        } else {
          localStorage.removeItem('adminToken');
        }
      } catch(e) {}
    }
  })();

  // ---------- ABAS ----------
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
    };
  });

  // ---------- REFRESH PLAYLIST ----------
  document.getElementById('refresh-playlist-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('refresh-playlist-btn');
    const originalText = btn.innerText;
    btn.innerText = '🔄 Atualizando...';
    btn.disabled = true;
    try {
      const res = await fetch(`${WORKER_URL}/refresh`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        alert('Cache da playlist limpo! Recarregando dados...');
        await loadMusicData();
      } else {
        alert('Erro ao limpar cache');
      }
    } catch (err) {
      alert('Erro de rede');
    } finally {
      btn.innerText = originalText;
      btn.disabled = false;
    }
  });

  // ---------- CARREGAR MÚSICAS (admin) ----------
  async function loadMusicData() {
    const container = document.getElementById('music-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando músicas...</div>';
    try {
      const res = await fetch(`${WORKER_URL}?admin=true`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      const videos = await res.json();
      if (!videos.length) {
        container.innerHTML = '<div class="state">Nenhuma música encontrada.</div>';
        return;
      }
      container.innerHTML = '';
      for (const video of videos) {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
          <img class="music-thumb" src="${escapeHtml(video.thumbnail)}" alt="${escapeHtml(video.title)}" loading="lazy">
          <div class="music-info">
            <div class="music-title">${escapeHtml(video.title)}</div>
            <div class="tags-area" id="tags-${video.id}">
              ${(video.tags || []).map(t => `
                <span class="tag">
                  ${escapeHtml(t)}
                  <button onclick="removeTag('${video.id}', 'music', '${escapeHtml(t)}')" title="Remover tag">✖</button>
                </span>
              `).join('')}
            </div>
            <div class="tag-input">
              <input type="text" placeholder="Nova tag" id="newtag-${video.id}" style="flex:1">
              <button onclick="addTag('${video.id}', 'music')">+</button>
            </div>
            <div><strong>Letra / Tradução</strong></div>
            <textarea id="lyrics-${video.id}" class="lyrics-box" rows="4">${escapeHtml(video.lyrics || '')}</textarea>
            <button class="save-btn" onclick="saveLyrics('${video.id}')">Salvar letra</button>
            <div class="status" id="status-${video.id}"></div>
          </div>
        `;
        container.appendChild(card);
      }
    } catch (err) {
      container.innerHTML = `<div class="state">Erro ao carregar músicas: ${err.message}</div>`;
    }
  }

  // ---------- CARREGAR JOGOS (config.js + tags + créditos) ----------
  async function loadGamesData() {
    const container = document.getElementById('games-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando jogos...</div>';
    try {
      const games = CONFIG.steam?.games || [];
      if (!games.length) {
        container.innerHTML = '<div class="state">Nenhum jogo configurado em config.js</div>';
        return;
      }
      container.innerHTML = '';
      for (const game of games) {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <div class="game-info">
            <div class="game-name">${escapeHtml(game.name)} (${game.appId})</div>
            <div class="tags-area" id="tags-${game.appId}">Carregando tags...</div>
            <div class="tag-input">
              <input type="text" placeholder="Nova tag" id="newtag-${game.appId}" style="flex:1">
              <button onclick="addTag('${game.appId}', 'game')">+</button>
            </div>
            <div><strong>Créditos / Prova de participação</strong></div>
            <textarea id="credits-${game.appId}" class="credits-box" rows="4">Carregando...</textarea>
            <button class="save-btn" onclick="saveGameCredits('${game.appId}')">Salvar créditos</button>
            <div class="status" id="status-${game.appId}"></div>
          </div>
        `;
        container.appendChild(card);

        // Carregar tags e créditos em paralelo
        const tagsPromise = fetch(`${WORKER_URL}/api/games/tags?id=${game.appId}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        }).then(r => r.json()).catch(() => ({ tags: [] }));
        const creditsPromise = fetch(`${WORKER_URL}/api/game/credits?id=${game.appId}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        }).then(r => r.json()).catch(() => ({ credits: '' }));

        const [tagsData, creditsData] = await Promise.all([tagsPromise, creditsPromise]);
        const tagsDiv = document.getElementById(`tags-${game.appId}`);
        if (tagsDiv) {
          tagsDiv.innerHTML = (tagsData.tags || []).map(t => `
            <span class="tag">
              ${escapeHtml(t)}
              <button onclick="removeTag('${game.appId}', 'game', '${escapeHtml(t)}')" title="Remover tag">✖</button>
            </span>
          `).join('');
        }
        const creditsTextarea = document.getElementById(`credits-${game.appId}`);
        if (creditsTextarea) creditsTextarea.value = creditsData.credits || '';
      }
    } catch (err) {
      container.innerHTML = `<div class="state">Erro ao carregar jogos: ${err.message}</div>`;
    }
  }

  // ---------- REMOVER TAG (genérico) ----------
  // Requer que o Worker suporte DELETE /api/music/tags e /api/games/tags
  // ou, alternativamente, um POST com action=remove. A implementação abaixo usa DELETE.
  window.removeTag = async (id, type, tag) => {
    const endpoint = type === 'music' ? '/api/music/tags' : '/api/games/tags';
    try {
      const res = await fetch(`${WORKER_URL}${endpoint}?id=${id}&tag=${encodeURIComponent(tag)}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        // Recarregar a aba correspondente
        if (type === 'music') loadMusicData();
        else loadGamesData();
      } else {
        const error = await res.text();
        alert(`Erro ao remover tag: ${error}`);
      }
    } catch (err) {
      alert('Erro de rede ao remover tag');
    }
  };

  // ---------- ADICIONAR TAG ----------
  window.addTag = async (id, type) => {
    const input = document.getElementById(`newtag-${id}`);
    const newTag = input.value.trim();
    if (!newTag) return;
    const endpoint = type === 'music' ? '/api/music/tags' : '/api/games/tags';
    try {
      const res = await fetch(`${WORKER_URL}${endpoint}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id, tag: newTag })
      });
      if (res.ok) {
        input.value = '';
        if (type === 'music') loadMusicData();
        else loadGamesData();
      } else {
        alert('Erro ao adicionar tag');
      }
    } catch (err) {
      alert('Erro de rede');
    }
  };

  // ---------- SALVAR LETRA (música) ----------
  window.saveLyrics = async (videoId) => {
    const lyrics = document.getElementById(`lyrics-${videoId}`).value;
    const statusDiv = document.getElementById(`status-${videoId}`);
    statusDiv.innerText = 'Salvando...';
    try {
      const res = await fetch(`${WORKER_URL}/api/music/lyrics`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id: videoId, lyrics })
      });
      if (res.ok) {
        statusDiv.innerText = '✅ Salvo!';
        setTimeout(() => statusDiv.innerText = '', 2000);
      } else {
        statusDiv.innerText = '❌ Erro ao salvar';
      }
    } catch (err) {
      statusDiv.innerText = '❌ Erro de rede';
    }
  };

  // ---------- SALVAR CRÉDITOS (jogo) ----------
  window.saveGameCredits = async (appId) => {
    const credits = document.getElementById(`credits-${appId}`).value;
    const statusDiv = document.getElementById(`status-${appId}`);
    statusDiv.innerText = 'Salvando...';
    try {
      const res = await fetch(`${WORKER_URL}/api/game/credits`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id: appId, credits })
      });
      if (res.ok) {
        statusDiv.innerText = '✅ Salvo!';
        setTimeout(() => statusDiv.innerText = '', 2000);
      } else {
        statusDiv.innerText = '❌ Erro ao salvar';
      }
    } catch (err) {
      statusDiv.innerText = '❌ Erro de rede';
    }
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
</script>
</body>
</html>
