<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - GenericBR</title>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d0f18;--surface:#161927;--card:#1c1f30;--border:rgba(255,255,255,0.07);--text:#e2e4ef;--muted:#6b7194;--em:#2979ff;--danger:#e53935}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:2rem}
    .container{max-width:1200px;margin:0 auto}
    .card{background:var(--surface);border-radius:20px;padding:1.75rem 2rem;margin-bottom:1.5rem;border:1px solid var(--border)}
    .login-card{max-width:400px;margin:2rem auto;text-align:center}
    input,textarea,select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.6rem 1rem;border-radius:10px;width:100%;margin-bottom:0.5rem}
    button{background:var(--em);border:none;color:#fff;padding:0.6rem 1.2rem;border-radius:10px;font-weight:500;cursor:pointer;transition:filter 0.15s}
    button:hover{filter:brightness(1.1)}
    .btn-danger{background:var(--danger)}
    .tag{display:inline-flex;align-items:center;gap:0.4rem;background:var(--card);padding:0.2rem 0.7rem;border-radius:20px;font-size:0.7rem;margin-right:0.4rem;margin-bottom:0.4rem;border:1px solid var(--border)}
    .tag button{background:none;border:none;color:var(--muted);font-size:0.8rem;cursor:pointer;padding:0}
    .tag button:hover{color:var(--danger)}
    .tabs{display:flex;gap:1rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border)}
    .tab{padding:0.75rem 1.5rem;cursor:pointer;opacity:0.7;font-weight:500}
    .tab.active{opacity:1;border-bottom:2px solid var(--em)}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .music-grid,.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1rem}
    .music-card,.game-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);transition:transform 0.15s}
    .music-card:hover,.game-card:hover{transform:translateY(-3px)}
    .music-thumb{width:100%;aspect-ratio:16/9;object-fit:cover}
    .music-info,.game-info{padding:1rem}
    .music-title,.game-name{font-size:0.9rem;font-weight:600;margin-bottom:0.5rem}
    .tags-area{margin:0.5rem 0;display:flex;flex-wrap:wrap}
    .tag-input{display:flex;gap:0.5rem;margin:0.5rem 0}
    .lyrics-box,.credits-box,.credits-image-url{margin:0.5rem 0;font-family:monospace;font-size:0.8rem;resize:vertical}
    .save-btn{background:#00a86b;width:100%;margin-top:0.5rem}
    .status{font-size:0.7rem;color:var(--muted);margin-top:0.3rem;text-align:center}
    .refresh-btn,.add-game-btn{margin-bottom:1rem}
    .add-game-btn{background:#00a86b}
    .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}
    .modal-content{background:var(--surface);border-radius:20px;padding:2rem;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
    .state{text-align:center;padding:3rem;color:var(--muted)}.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--muted);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 0.75rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{text-align:center;font-size:0.7rem;color:var(--muted);margin-top:2rem}
  </style>
</head>
<body>
<div class="container">
  <h1>🎛️ Admin Dashboard</h1>
  <div id="login-section" class="card login-card">
    <h2>Login</h2>
    <input type="password" id="admin-password" placeholder="Senha">
    <button id="login-btn">Entrar</button>
    <div id="login-error" class="status" style="color:#e53935"></div>
  </div>
  <div id="admin-content" style="display:none">
    <div class="tabs"><div class="tab active" data-tab="music">🎵 Músicas (letras + tags)</div><div class="tab" data-tab="games">🎮 Jogos (gerenciar + tags + imagem de crédito)</div></div>
    <div id="music-tab" class="tab-content active">
      <button id="refresh-playlist-btn" class="refresh-btn">🔄 Forçar atualização da playlist (cache)</button>
      <div id="music-list" class="music-grid"><div class="state"><div class="spinner"></div>Carregando músicas...</div></div>
    </div>
    <div id="games-tab" class="tab-content">
      <button id="add-game-btn" class="add-game-btn">➕ Adicionar novo jogo</button>
      <div id="games-list" class="games-grid"><div class="state"><div class="spinner"></div>Carregando jogos...</div></div>
    </div>
  </div>
  <div class="footer">GenericBR Admin · Alterações salvas via Cloudflare KV</div>
</div>
<script>
  const WORKER_URL = 'https://portfolio.genericbr-business.workers.dev';
  let authToken = null;

  // ---------- LOGIN ----------
  document.getElementById('login-btn').onclick = async () => {
    const pwd = document.getElementById('admin-password').value;
    try {
      const res = await fetch(`${WORKER_URL}/auth`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
      const data = await res.json();
      if (res.ok && data.token) {
        authToken = data.token;
        localStorage.setItem('adminToken', authToken);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadMusicData(); loadGamesData();
      } else document.getElementById('login-error').innerText = data.error || 'Falha no login';
    } catch(e) { document.getElementById('login-error').innerText = 'Erro de rede'; }
  };
  (async () => {
    const saved = localStorage.getItem('adminToken');
    if (saved) {
      try {
        const res = await fetch(`${WORKER_URL}/auth/check`, { headers:{'Authorization':`Bearer ${saved}`} });
        if (res.ok) { authToken = saved; document.getElementById('login-section').style.display = 'none'; document.getElementById('admin-content').style.display = 'block'; loadMusicData(); loadGamesData(); }
        else localStorage.removeItem('adminToken');
      } catch(e) {}
    }
  })();

  // ---------- ABAS ----------
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
    };
  });

  // ---------- REFRESH PLAYLIST ----------
  document.getElementById('refresh-playlist-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('refresh-playlist-btn');
    const orig = btn.innerText;
    btn.innerText = '🔄 Atualizando...'; btn.disabled = true;
    try {
      const res = await fetch(`${WORKER_URL}/refresh`, { method:'POST', headers:{'Authorization':`Bearer ${authToken}`} });
      if (res.ok) { alert('Cache limpo!'); await loadMusicData(); }
      else alert('Erro ao limpar cache');
    } catch(e) { alert('Erro de rede'); }
    finally { btn.innerText = orig; btn.disabled = false; }
  });

  // ========== MÚSICAS ==========
  async function loadMusicData() {
    const container = document.getElementById('music-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando músicas...</div>';
    try {
      const res = await fetch(`${WORKER_URL}?admin=true`, { headers:{'Authorization':`Bearer ${authToken}`} });
      const videos = await res.json();
      if (!videos.length) { container.innerHTML = '<div class="state">Nenhuma música encontrada.</div>'; return; }
      container.innerHTML = '';
      for (const v of videos) {
        const card = document.createElement('div'); card.className = 'music-card';
        card.innerHTML = `
          <img class="music-thumb" src="${escapeHtml(v.thumbnail)}" alt="${escapeHtml(v.title)}" loading="lazy">
          <div class="music-info">
            <div class="music-title">${escapeHtml(v.title)}</div>
            <div class="tags-area" id="tags-${v.id}">${(v.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}<button onclick="removeTag('${v.id}','music','${escapeHtml(t)}')">✖</button></span>`).join('')}</div>
            <div class="tag-input"><input type="text" placeholder="Nova tag" id="newtag-${v.id}"><button onclick="addTag('${v.id}','music')">+</button></div>
            <div><strong>Letra / Tradução</strong></div>
            <textarea id="lyrics-${v.id}" class="lyrics-box" rows="4">${escapeHtml(v.lyrics||'')}</textarea>
            <button class="save-btn" onclick="saveLyrics('${v.id}')">Salvar letra</button>
            <div class="status" id="status-${v.id}"></div>
          </div>`;
        container.appendChild(card);
      }
    } catch(e) { container.innerHTML = `<div class="state">Erro: ${e.message}</div>`; }
  }
  window.saveLyrics = async (id) => {
    const lyrics = document.getElementById(`lyrics-${id}`).value;
    const statusDiv = document.getElementById(`status-${id}`);
    statusDiv.innerText = 'Salvando...';
    try {
      const res = await fetch(`${WORKER_URL}/api/music/lyrics`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`}, body:JSON.stringify({id,lyrics}) });
      if (res.ok) { statusDiv.innerText = '✅ Salvo!'; setTimeout(()=>statusDiv.innerText='',2000); }
      else statusDiv.innerText = '❌ Erro';
    } catch(e) { statusDiv.innerText = '❌ Rede'; }
  };

  // ========== JOGOS (CRUD + tags + créditos imagem) ==========
  async function loadGamesData() {
    const container = document.getElementById('games-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando jogos...</div>';
    try {
      const res = await fetch(`${WORKER_URL}/api/games?admin=true`, { headers:{'Authorization':`Bearer ${authToken}`} });
      const games = await res.json();
      if (!games.length) { container.innerHTML = '<div class="state">Nenhum jogo. Clique em "Adicionar novo jogo".</div>'; return; }
      container.innerHTML = '';
      for (const game of games) {
        const tagsRes = await fetch(`${WORKER_URL}/api/games/tags?id=${game.appId}`, { headers:{'Authorization':`Bearer ${authToken}`} }).then(r=>r.json()).catch(()=>({tags:[]}));
        const creditsRes = await fetch(`${WORKER_URL}/api/game/credits?id=${game.appId}`, { headers:{'Authorization':`Bearer ${authToken}`} }).then(r=>r.json()).catch(()=>({creditsImage:''}));
        const card = document.createElement('div'); card.className = 'game-card';
        card.innerHTML = `
          <div class="game-info">
            <div class="game-name">${escapeHtml(game.name)} (${game.appId})</div>
            <div><strong>Role:</strong> <input type="text" id="role-${game.appId}" value="${escapeHtml(game.role||'')}"></div>
            <div><strong>Developer:</strong> <input type="text" id="dev-${game.appId}" value="${escapeHtml(game.dev||'')}"></div>
            <div><strong>Note:</strong> <input type="text" id="note-${game.appId}" value="${escapeHtml(game.note||'')}"></div>
            <div><strong>Description:</strong> <textarea id="desc-${game.appId}" rows="2">${escapeHtml(game.description||'')}</textarea></div>
            <div><strong>Genre:</strong> <input type="text" id="genre-${game.appId}" value="${escapeHtml(game.genre||'')}"></div>
            <div><strong>Cover image URL:</strong> <input type="text" id="cover-${game.appId}" value="${escapeHtml(game.cover||'')}" placeholder="https://..."></div>
            <div class="tags-area" id="tags-${game.appId}">${(tagsRes.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}<button onclick="removeTag('${game.appId}','game','${escapeHtml(t)}')">✖</button></span>`).join('')}</div>
            <div class="tag-input"><input type="text" placeholder="Nova tag" id="newtag-${game.appId}"><button onclick="addTag('${game.appId}','game')">+</button></div>
            <div><strong>Imagem de crédito (URL):</strong></div>
            <input type="text" id="creditsImage-${game.appId}" value="${escapeHtml(creditsRes.creditsImage||'')}" placeholder="https://exemplo.com/prova.jpg">
            <button class="save-btn" onclick="saveGameData('${game.appId}')">Salvar alterações</button>
            <button class="save-btn btn-danger" style="margin-top:0.3rem" onclick="deleteGame('${game.appId}')">Excluir jogo</button>
            <div class="status" id="status-${game.appId}"></div>
          </div>`;
        container.appendChild(card);
      }
    } catch(e) { container.innerHTML = `<div class="state">Erro: ${e.message}</div>`; }
  }
  window.saveGameData = async (appId) => {
    const statusDiv = document.getElementById(`status-${appId}`);
    statusDiv.innerText = 'Salvando...';
    const gameData = {
      appId, name: document.querySelector(`#games-list .game-card .game-name`)?.innerText.split(' (')[0] || appId,
      role: document.getElementById(`role-${appId}`).value, dev: document.getElementById(`dev-${appId}`).value,
      note: document.getElementById(`note-${appId}`).value, description: document.getElementById(`desc-${appId}`).value,
      genre: document.getElementById(`genre-${appId}`).value, cover: document.getElementById(`cover-${appId}`).value
    };
    try {
      const res = await fetch(`${WORKER_URL}/api/games`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`}, body:JSON.stringify(gameData) });
      if (!res.ok) throw new Error();
      const creditsImage = document.getElementById(`creditsImage-${appId}`).value;
      await fetch(`${WORKER_URL}/api/game/credits`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`}, body:JSON.stringify({id:appId, creditsImage}) });
      statusDiv.innerText = '✅ Salvo!'; setTimeout(()=>statusDiv.innerText='',2000);
    } catch(e) { statusDiv.innerText = '❌ Erro'; }
  };
  window.deleteGame = async (appId) => {
    if (!confirm(`Excluir jogo ${appId}?`)) return;
    const statusDiv = document.getElementById(`status-${appId}`);
    statusDiv.innerText = 'Excluindo...';
    try {
      const res = await fetch(`${WORKER_URL}/api/games?appId=${appId}`, { method:'DELETE', headers:{'Authorization':`Bearer ${authToken}`} });
      if (res.ok) loadGamesData();
      else statusDiv.innerText = '❌ Erro';
    } catch(e) { statusDiv.innerText = '❌ Rede'; }
  };
  document.getElementById('add-game-btn')?.addEventListener('click', () => {
    const modal = document.createElement('div'); modal.className = 'modal';
    modal.innerHTML = `<div class="modal-content"><h3>Adicionar novo jogo</h3><input type="text" id="new-appid" placeholder="App ID (ex: 4178020)"><input type="text" id="new-name" placeholder="Nome do jogo"><button id="confirm-add-game">Adicionar</button><button id="cancel-add-game">Cancelar</button></div>`;
    document.body.appendChild(modal);
    document.getElementById('confirm-add-game').onclick = async () => {
      const appId = document.getElementById('new-appid').value.trim(), name = document.getElementById('new-name').value.trim();
      if (!appId || !name) return alert('Preencha App ID e Nome');
      try {
        const res = await fetch(`${WORKER_URL}/api/games`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`}, body:JSON.stringify({appId,name,role:'',dev:'',note:'',description:'',genre:'',cover:''}) });
        if (res.ok) { modal.remove(); loadGamesData(); }
        else alert('Erro ao adicionar');
      } catch(e) { alert('Erro de rede'); }
    };
    document.getElementById('cancel-add-game').onclick = () => modal.remove();
  });

  // ---------- TAGS (genérico) ----------
  window.addTag = async (id, type) => {
    const input = document.getElementById(`newtag-${id}`);
    const tag = input.value.trim();
    if (!tag) return;
    const endpoint = type === 'music' ? '/api/music/tags' : '/api/games/tags';
    try {
      const res = await fetch(`${WORKER_URL}${endpoint}`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`}, body:JSON.stringify({id,tag}) });
      if (res.ok) { input.value = ''; if (type === 'music') loadMusicData(); else loadGamesData(); }
      else alert('Erro');
    } catch(e) { alert('Rede'); }
  };
  window.removeTag = async (id, type, tag) => {
    const endpoint = type === 'music' ? '/api/music/tags' : '/api/games/tags';
    try {
      const res = await fetch(`${WORKER_URL}${endpoint}?id=${id}&tag=${encodeURIComponent(tag)}`, { method:'DELETE', headers:{'Authorization':`Bearer ${authToken}`} });
      if (res.ok) { if (type === 'music') loadMusicData(); else loadGamesData(); }
      else alert('Erro');
    } catch(e) { alert('Rede'); }
  };

  function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
</script>
</body>
</html>
