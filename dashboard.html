<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - GenericBR</title>
  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d0f18;--surface:#161927;--card:#1c1f30;--border:rgba(255,255,255,0.07);--text:#e2e4ef;--muted:#6b7194;--em:#2979ff;--danger:#e53935}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:2rem}
    .container{max-width:1200px;margin:0 auto}
    .card{background:var(--surface);border-radius:20px;padding:1.75rem 2rem;margin-bottom:1.5rem;border:1px solid var(--border)}
    .login-card{max-width:400px;margin:2rem auto;text-align:center}
    input,textarea,select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:0.6rem 1rem;border-radius:10px;width:100%;margin-bottom:0.5rem}
    button{background:var(--em);border:none;color:#fff;padding:0.6rem 1.2rem;border-radius:10px;font-weight:500;cursor:pointer;transition:filter 0.15s}
    button:hover{filter:brightness(1.1)}.btn-danger{background:var(--danger)}
    .tag{display:inline-flex;align-items:center;gap:0.4rem;background:var(--card);padding:0.2rem 0.7rem;border-radius:20px;font-size:0.7rem;margin-right:0.4rem;margin-bottom:0.4rem;border:1px solid var(--border)}
    .tag button{background:none;border:none;color:var(--muted);font-size:0.8rem;cursor:pointer;padding:0}.tag button:hover{color:var(--danger)}
    .tag-preview{display:inline-block;padding:0.2rem 0.7rem;border-radius:20px;font-size:0.7rem;margin-right:0.5rem;margin-bottom:0.5rem}
    .tabs{display:flex;gap:1rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border)}
    .tab{padding:0.75rem 1.5rem;cursor:pointer;opacity:0.7;font-weight:500}.tab.active{opacity:1;border-bottom:2px solid var(--em)}
    .tab-content{display:none}.tab-content.active{display:block}
    .music-grid,.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1rem}
    .music-card,.game-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border)}
    .music-thumb{width:100%;aspect-ratio:16/9;object-fit:cover}
    .music-info,.game-info{padding:1rem}
    .music-title,.game-name{font-size:0.9rem;font-weight:600}
    .tags-area{margin:0.5rem 0;display:flex;flex-wrap:wrap}
    .tag-input{display:flex;gap:0.5rem;margin:0.5rem 0}
    .lyrics-box,.credits-box{margin:0.5rem 0;font-family:monospace;font-size:0.8rem;resize:vertical}
    .save-btn{background:#00a86b;width:100%;margin-top:0.5rem}
    .status{font-size:0.7rem;color:var(--muted);margin-top:0.3rem;text-align:center}
    .refresh-btn,.add-game-btn{margin-bottom:1rem}.add-game-btn{background:#00a86b}
    .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}
    .modal-content{background:var(--surface);border-radius:20px;padding:2rem;max-width:500px;width:90%}
    .preset-tags{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
    .preset-btn{background:rgba(255,255,255,0.1);padding:0.3rem 0.8rem;border-radius:20px;font-size:0.7rem;cursor:pointer}
    .footer{text-align:center;font-size:0.7rem;color:var(--muted);margin-top:2rem}
  </style>
</head>
<body>
<div class="container"><h1>🎛️ Admin Dashboard</h1>
<div id="login-section" class="card login-card"><h2>Login</h2><input type="password" id="admin-password"><button id="login-btn">Entrar</button><div id="login-error" class="status" style="color:#e53935"></div></div>
<div id="admin-content" style="display:none"><div class="tabs"><div class="tab active" data-tab="music">🎵 Músicas (letras + tags)</div><div class="tab" data-tab="games">🎮 Jogos (gerenciar + tags + imagem de crédito)</div></div>
<div id="music-tab" class="tab-content active"><button id="refresh-playlist-btn" class="refresh-btn">🔄 Forçar atualização da playlist</button><div id="music-list" class="music-grid"><div class="state"><div class="spinner"></div>Carregando...</div></div></div>
<div id="games-tab" class="tab-content"><button id="add-game-btn" class="add-game-btn">➕ Adicionar novo jogo</button><div id="games-list" class="games-grid"><div class="state"><div class="spinner"></div>Carregando jogos...</div></div></div></div>
<div class="footer">GenericBR Admin · Alterações salvas via Cloudflare KV</div></div>
<script>
  const WORKER_URL='https://portfolio.genericbr-business.workers.dev';let authToken=null;
  document.getElementById('login-btn').onclick=async()=>{const pwd=document.getElementById('admin-password').value;try{const r=await fetch(`${WORKER_URL}/auth`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})}),d=await r.json();if(r.ok&&d.token){authToken=d.token;localStorage.setItem('adminToken',authToken);document.getElementById('login-section').style.display='none';document.getElementById('admin-content').style.display='block';loadMusicData();loadGamesData();}else document.getElementById('login-error').innerText=d.error||'Falha';}catch(e){document.getElementById('login-error').innerText='Erro de rede';}};
  (async()=>{const s=localStorage.getItem('adminToken');if(s)try{const r=await fetch(`${WORKER_URL}/auth/check`,{headers:{'Authorization':`Bearer ${s}`}});if(r.ok){authToken=s;document.getElementById('login-section').style.display='none';document.getElementById('admin-content').style.display='block';loadMusicData();loadGamesData();}else localStorage.removeItem('adminToken');}catch(e){}})();
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(tt=>tt.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));t.classList.add('active');document.getElementById(`${t.dataset.tab}-tab`).classList.add('active');});
  document.getElementById('refresh-playlist-btn')?.addEventListener('click',async()=>{const btn=document.getElementById('refresh-playlist-btn'),orig=btn.innerText;btn.innerText='🔄 Atualizando...';btn.disabled=true;try{const r=await fetch(`${WORKER_URL}/refresh`,{method:'POST',headers:{'Authorization':`Bearer ${authToken}`}});if(r.ok){alert('Cache limpo!');await loadMusicData();}else alert('Erro');}catch(e){alert('Rede');}finally{btn.innerText=orig;btn.disabled=false;}});
  async function loadMusicData(){const c=document.getElementById('music-list');c.innerHTML='<div class="state"><div class="spinner"></div>Carregando...</div>';try{const r=await fetch(`${WORKER_URL}?admin=true`,{headers:{'Authorization':`Bearer ${authToken}`}}),v=await r.json();if(!v.length){c.innerHTML='<div class="state">Nenhuma música.</div>';return;}c.innerHTML='';for(const vd of v){const card=document.createElement('div');card.className='music-card';card.innerHTML=`<img class="music-thumb" src="${escapeHtml(vd.thumbnail)}"><div class="music-info"><div class="music-title">${escapeHtml(vd.title)}</div><div class="tags-area" id="tags-${vd.id}">${(vd.tags||[]).map(t=>`<span class="tag" style="background:${t.color||'rgba(255,255,255,0.08)'}">${escapeHtml(t.name||t)}<button onclick="removeTag('${vd.id}','music','${escapeHtml(t.name||t)}')">✖</button></span>`).join('')}</div><div class="tag-input"><input type="text" placeholder="Nova tag" id="newtag-${vd.id}"><div class="preset-tags" style="margin-top:0.3rem"><div class="preset-btn" onclick="addPresetTag('${vd.id}','music','Volunteer','rgba(245,158,11,0.2)')">Volunteer</div><div class="preset-btn" onclick="addPresetTag('${vd.id}','music','Localizer','rgba(0,168,107,0.2)')">Localizer</div><div class="preset-btn" onclick="addPresetTag('${vd.id}','music','Reviewer','rgba(229,57,53,0.2)')">Reviewer</div><button onclick="showCustomTagInput('${vd.id}','music')">Custom</button></div><div id="custom-tag-${vd.id}" style="display:none"><input type="text" placeholder="Tag name" id="custom-name-${vd.id}" style="width:60%"><input type="color" id="custom-color-${vd.id}" value="#6b7194"><button onclick="addCustomTag('${vd.id}','music')">Add</button></div></div><div><strong>Letra / Tradução</strong></div><textarea id="lyrics-${vd.id}" rows="4" class="lyrics-box">${escapeHtml(vd.lyrics||'')}</textarea><button class="save-btn" onclick="saveLyrics('${vd.id}')">Salvar letra</button><div class="status" id="status-${vd.id}"></div></div>`;c.appendChild(card);}}catch(e){c.innerHTML=`<div class="state">Erro: ${e.message}</div>`;}}
  window.saveLyrics=async(id)=>{const lyrics=document.getElementById(`lyrics-${id}`).value,status=document.getElementById(`status-${id}`);status.innerText='Salvando...';try{const r=await fetch(`${WORKER_URL}/api/music/lyrics`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},body:JSON.stringify({id,lyrics})});if(r.ok){status.innerText='✅ Salvo!';setTimeout(()=>status.innerText='',2000);}else status.innerText='❌ Erro';}catch(e){status.innerText='❌ Rede';}};
  window.addPresetTag=async(id,type,name,color)=>{const tag={name,color};await addTagObject(id,type,tag);};
  window.showCustomTagInput=(id,type)=>{const div=document.getElementById(`custom-tag-${id}`);div.style.display=div.style.display==='none'?'flex':'none';};
  window.addCustomTag=async(id,type)=>{const name=document.getElementById(`custom-name-${id}`).value.trim(),color=document.getElementById(`custom-color-${id}`).value;if(!name)return;await addTagObject(id,type,{name,color});document.getElementById(`custom-name-${id}`).value='';document.getElementById(`custom-tag-${id}`).style.display='none';};
  window.addTagObject=async(id,type,tagObj)=>{const endpoint=type==='music'?'/api/music/tags':'/api/games/tags';try{const r=await fetch(`${WORKER_URL}${endpoint}`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},body:JSON.stringify({id,tag:tagObj})});if(r.ok){if(type==='music')loadMusicData();else loadGamesData();}else alert('Erro');}catch(e){alert('Rede');}};
  window.removeTag=async(id,type,tagName)=>{const endpoint=type==='music'?'/api/music/tags':'/api/games/tags';try{const r=await fetch(`${WORKER_URL}${endpoint}?id=${id}&tag=${encodeURIComponent(tagName)}`,{method:'DELETE',headers:{'Authorization':`Bearer ${authToken}`}});if(r.ok){if(type==='music')loadMusicData();else loadGamesData();}else alert('Erro');}catch(e){alert('Rede');}};
  // JOGOS (CRUD + créditos imagem)
  async function loadGamesData(){const c=document.getElementById('games-list');c.innerHTML='<div class="state"><div class="spinner"></div>Carregando...</div>';try{const r=await fetch(`${WORKER_URL}/api/games?admin=true`,{headers:{'Authorization':`Bearer ${authToken}`}}),games=await r.json();if(!games.length){c.innerHTML='<div class="state">Nenhum jogo. Clique em "Adicionar novo jogo".</div>';return;}c.innerHTML='';for(const game of games){const tagsRes=await fetch(`${WORKER_URL}/api/games/tags?id=${game.appId}`,{headers:{'Authorization':`Bearer ${authToken}`}}).then(r=>r.json()).catch(()=>({tags:[]}));const creditsRes=await fetch(`${WORKER_URL}/api/game/credits?id=${game.appId}`,{headers:{'Authorization':`Bearer ${authToken}`}}).then(r=>r.json()).catch(()=>({creditsImage:'',creditsChips:[]}));const card=document.createElement('div');card.className='game-card';card.innerHTML=`<div class="game-info"><div class="game-name">${escapeHtml(game.name)} (${game.appId})</div><div><strong>Role:</strong> <input type="text" id="role-${game.appId}" value="${escapeHtml(game.role||'')}"></div><div><strong>Developer:</strong> <input type="text" id="dev-${game.appId}" value="${escapeHtml(game.dev||'')}"></div><div><strong>Release date:</strong> <input type="text" id="release-${game.appId}" value="${escapeHtml(game.releaseDate||'')}" placeholder="YYYY-MM-DD"></div><div><strong>Original language:</strong> <input type="text" id="lang-${game.appId}" value="${escapeHtml(game.originalLanguage||'')}"></div><div><strong>Description:</strong> <textarea id="desc-${game.appId}" rows="2">${escapeHtml(game.description||'')}</textarea></div><div><strong>Cover URL:</strong> <input type="text" id="cover-${game.appId}" value="${escapeHtml(game.cover||'')}"></div><div><strong>Screenshots (URLs, one per line):</strong> <textarea id="screenshots-${game.appId}" rows="2">${(game.screenshots||[]).join('\n')}</textarea></div><div><strong>Credits (name and role, one per line, format: Name|Role):</strong> <textarea id="creditsChips-${game.appId}" rows="3">${(creditsRes.creditsChips||[]).map(c=>`${c.name}|${c.role||''}`).join('\n')}</textarea></div><div class="tags-area" id="tags-${game.appId}">${(tagsRes.tags||[]).map(t=>`<span class="tag" style="background:${t.color||'rgba(255,255,255,0.08)'}">${escapeHtml(t.name||t)}<button onclick="removeTag('${game.appId}','game','${escapeHtml(t.name||t)}')">✖</button></span>`).join('')}</div><div class="tag-input"><input type="text" placeholder="Nova tag" id="newtag-${game.appId}"><div class="preset-tags"><div class="preset-btn" onclick="addPresetTag('${game.appId}','game','Volunteer','rgba(245,158,11,0.2)')">Volunteer</div><div class="preset-btn" onclick="addPresetTag('${game.appId}','game','Localizer','rgba(0,168,107,0.2)')">Localizer</div><div class="preset-btn" onclick="addPresetTag('${game.appId}','game','Reviewer','rgba(229,57,53,0.2)')">Reviewer</div><button onclick="showCustomTagInput('${game.appId}','game')">Custom</button></div><div id="custom-tag-${game.appId}" style="display:none"><input type="text" placeholder="Tag name" id="custom-name-${game.appId}" style="width:60%"><input type="color" id="custom-color-${game.appId}" value="#6b7194"><button onclick="addCustomTag('${game.appId}','game')">Add</button></div></div><div><strong>Imagem de crédito (URL):</strong></div><input type="text" id="creditsImage-${game.appId}" value="${escapeHtml(creditsRes.creditsImage||'')}"><button class="save-btn" onclick="saveGameData('${game.appId}')">Salvar alterações</button><button class="save-btn btn-danger" style="margin-top:0.3rem" onclick="deleteGame('${game.appId}')">Excluir jogo</button><div class="status" id="status-${game.appId}"></div></div>`;c.appendChild(card);}}catch(e){c.innerHTML=`<div class="state">Erro: ${e.message}</div>`;}}
  window.saveGameData=async(appId)=>{const status=document.getElementById(`status-${appId}`);status.innerText='Salvando...';const gameData={appId,name:document.querySelector(`#games-list .game-card .game-name`)?.innerText.split(' (')[0]||appId,role:document.getElementById(`role-${appId}`).value,dev:document.getElementById(`dev-${appId}`).value,releaseDate:document.getElementById(`release-${appId}`).value,originalLanguage:document.getElementById(`lang-${appId}`).value,description:document.getElementById(`desc-${appId}`).value,cover:document.getElementById(`cover-${appId}`).value,screenshots:document.getElementById(`screenshots-${appId}`).value.split('\n').filter(l=>l.trim()),creditsChips:document.getElementById(`creditsChips-${appId}`).value.split('\n').filter(l=>l.trim()).map(line=>{const [name,role]=line.split('|');return{name:name.trim(),role:role?role.trim():''}})};try{const r=await fetch(`${WORKER_URL}/api/games`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},body:JSON.stringify(gameData)});if(!r.ok)throw new Error();const creditsImage=document.getElementById(`creditsImage-${appId}`).value;await fetch(`${WORKER_URL}/api/game/credits`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},body:JSON.stringify({id:appId,creditsImage,creditsChips:gameData.creditsChips})});status.innerText='✅ Salvo!';setTimeout(()=>status.innerText='',2000);}catch(e){status.innerText='❌ Erro';}};
  window.deleteGame=async(appId)=>{if(!confirm(`Excluir jogo ${appId}?`))return;const status=document.getElementById(`status-${appId}`);status.innerText='Excluindo...';try{const r=await fetch(`${WORKER_URL}/api/games?appId=${appId}`,{method:'DELETE',headers:{'Authorization':`Bearer ${authToken}`}});if(r.ok)loadGamesData();else status.innerText='❌ Erro';}catch(e){status.innerText='❌ Rede';}};
  document.getElementById('add-game-btn')?.addEventListener('click',()=>{const modal=document.createElement('div');modal.className='modal';modal.innerHTML=`<div class="modal-content"><h3>Adicionar novo jogo</h3><input type="text" id="new-appid" placeholder="App ID"><input type="text" id="new-name" placeholder="Nome"><button id="confirm-add">Adicionar</button><button id="cancel-add">Cancelar</button></div>`;document.body.appendChild(modal);document.getElementById('confirm-add').onclick=async()=>{const appId=document.getElementById('new-appid').value.trim(),name=document.getElementById('new-name').value.trim();if(!appId||!name)return alert('Preencha App ID e Nome');try{const r=await fetch(`${WORKER_URL}/api/games`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},body:JSON.stringify({appId,name,role:'',dev:'',releaseDate:'',originalLanguage:'',description:'',cover:'',screenshots:[],creditsChips:[]})});if(r.ok){modal.remove();loadGamesData();}else alert('Erro');}catch(e){alert('Rede');}};document.getElementById('cancel-add').onclick=()=>modal.remove();});
  function escapeHtml(s){if(!s)return'';return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);}
</script>
</body>
</html>
