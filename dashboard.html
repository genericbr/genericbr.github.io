<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - GenericBR</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ====== Aparência consistente com o site principal ====== */
    :root {
      --bg: #0d0f18;
      --surface: #161927;
      --card: #1c1f30;
      --border: rgba(255,255,255,0.07);
      --text: #e2e4ef;
      --muted: #6b7194;
      --em: #2979ff;
      --success: #00a86b;
      --danger: #e53935;
      --warning: #f5a623;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 2rem;
      line-height: 1.5;
    }
    .container { max-width: 1280px; margin: 0 auto; }

    /* Header */
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .login-card { max-width: 420px; margin: 2rem auto; text-align: center; }

    /* Inputs & buttons */
    input, textarea, select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1rem;
      border-radius: 10px;
      width: 100%;
      margin-bottom: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--em);
    }
    button {
      background: var(--em);
      border: none;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: scale(0.98); }
    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }

    /* Tags */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--card);
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      margin: 0.2rem;
      border: 1px solid var(--border);
    }
    .tag button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0;
    }
    .tag button:hover { color: var(--danger); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      opacity: 0.7;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .tab.active {
      opacity: 1;
      border-bottom: 2px solid var(--em);
      color: var(--text);
    }
    .tab:hover { opacity: 1; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Grids */
    .music-grid, .games-grid, .audiovisuals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1rem;
    }
    .music-card, .game-card, .audiovisual-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .music-card:hover, .game-card:hover, .audiovisual-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .music-thumb, .audiovisual-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--bg);
    }
    .music-info, .game-info, .audiovisual-info { padding: 1rem; }
    .music-title, .game-name, .audiovisual-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .tags-area { margin: 0.5rem 0; display: flex; flex-wrap: wrap; }
    .tag-input { display: flex; gap: 0.5rem; margin: 0.5rem 0; }
    .save-btn { width: 100%; margin-top: 0.5rem; }
    .status {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.3rem;
      text-align: center;
    }

    .preset-tags { display: flex; gap: 0.5rem; margin: 0.5rem 0; flex-wrap: wrap; }
    .preset-btn {
      background: rgba(255,255,255,0.08);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .preset-btn:hover { background: rgba(255,255,255,0.15); }

    .custom-tag-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }
    .custom-tag-row input[type="text"] { flex: 2; margin-bottom: 0; }
    .custom-tag-row input[type="color"] { width: 50px; height: 38px; padding: 0; margin-bottom: 0; }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background: var(--surface);
      border-radius: 20px;
      padding: 2rem;
      max-width: 560px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid var(--border);
    }
    .modal-content h3 { margin-bottom: 1rem; font-weight: 600; }
    .modal-content input, .modal-content textarea { margin-bottom: 0.8rem; }
    .modal-buttons { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }

    /* State */
    .state { text-align: center; padding: 3rem; color: var(--muted); }
    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2rem;
      opacity: 0.7;
    }

    /* Action bar */
    .action-bar { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎛️ Admin Dashboard</h1>
  
  <!-- Login -->
  <div id="login-section" class="card login-card">
    <h2 style="margin-bottom:1.5rem; font-weight:600;">Acesso restrito</h2>
    <input type="password" id="admin-password" placeholder="Senha do admin">
    <button id="login-btn" style="width:100%;">Entrar</button>
    <div id="login-error" style="color:var(--danger); margin-top:0.5rem;"></div>
  </div>

  <!-- Conteúdo autenticado -->
  <div id="admin-content" style="display:none">
    <div class="tabs">
      <div class="tab active" data-tab="music">🎵 Músicas</div>
      <div class="tab" data-tab="games">🎮 Jogos</div>
      <div class="tab" data-tab="audiovisuals">🎬 Audiovisuais</div>
    </div>

    <!-- Músicas -->
    <div id="music-tab" class="tab-content active">
      <div class="action-bar">
        <button id="refresh-playlist-btn" class="btn-outline">🔄 Forçar atualização (limpar cache)</button>
      </div>
      <div id="music-list" class="music-grid">
        <div class="state"><div class="spinner"></div>Carregando músicas...</div>
      </div>
    </div>

    <!-- Jogos -->
    <div id="games-tab" class="tab-content">
      <div class="action-bar">
        <button id="add-game-btn" class="btn-success">➕ Adicionar novo jogo</button>
      </div>
      <div id="games-list" class="games-grid">
        <div class="state"><div class="spinner"></div>Carregando jogos...</div>
      </div>
    </div>

    <!-- Audiovisuais -->
    <div id="audiovisuals-tab" class="tab-content">
      <div class="action-bar">
        <button id="add-audiovisual-btn" class="btn-success">➕ Novo projeto audiovisual</button>
      </div>
      <div id="audiovisuals-list" class="audiovisuals-grid">
        <div class="state"><div class="spinner"></div>Carregando projetos...</div>
      </div>
    </div>

  </div>
  <div class="footer">GenericBR Admin · Cloudflare KV</div>
</div>

<script>
  const WORKER_URL = 'https://portfolio.genericbr-business.workers.dev';
  let authToken = null;

  // ---------- LOGIN ----------
  document.getElementById('login-btn').onclick = async () => {
    const pwd = document.getElementById('admin-password').value;
    const errorEl = document.getElementById('login-error');
    try {
      const res = await fetch(`${WORKER_URL}/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        authToken = data.token;
        localStorage.setItem('adminToken', authToken);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadMusicData();
        loadGamesData();
        loadAudiovisualsData();
      } else {
        errorEl.innerText = data.error || 'Senha incorreta';
      }
    } catch(e) {
      errorEl.innerText = 'Erro de rede';
    }
  };

  // Auto-login
  (async () => {
    const saved = localStorage.getItem('adminToken');
    if (saved) {
      try {
        const res = await fetch(`${WORKER_URL}/auth/check`, {
          headers: { 'Authorization': `Bearer ${saved}` }
        });
        if (res.ok) {
          authToken = saved;
          document.getElementById('login-section').style.display = 'none';
          document.getElementById('admin-content').style.display = 'block';
          loadMusicData();
          loadGamesData();
          loadAudiovisualsData();
        } else {
          localStorage.removeItem('adminToken');
        }
      } catch(e) {}
    }
  })();

  // ---------- ABAS ----------
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
    };
  });

  // ---------- REFRESH PLAYLIST ----------
  document.getElementById('refresh-playlist-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('refresh-playlist-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '⏳ Atualizando...';
    btn.disabled = true;
    try {
      const res = await fetch(`${WORKER_URL}/refresh`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        alert('✅ Cache limpo! A playlist será recarregada.');
        await loadMusicData();
      } else {
        alert('Erro ao limpar cache');
      }
    } catch(e) {
      alert('Erro de rede');
    } finally {
      btn.innerHTML = orig;
      btn.disabled = false;
    }
  });

  // ========== MÚSICAS (tags com cores, letras) ==========
  async function loadMusicData() {
    const container = document.getElementById('music-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando músicas...</div>';
    try {
      const res = await fetch(`${WORKER_URL}?admin=true`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      const videos = await res.json();
      if (!videos.length) {
        container.innerHTML = '<div class="state">Nenhuma música encontrada.</div>';
        return;
      }
      container.innerHTML = '';
      for (const v of videos) {
        const card = document.createElement('div');
        card.className = 'music-card';
        card.innerHTML = `
          <img class="music-thumb" src="${escapeHtml(v.thumbnail)}" alt="${escapeHtml(v.title)}" loading="lazy">
          <div class="music-info">
            <div class="music-title">${escapeHtml(v.title)}</div>
            <div class="tags-area" id="tags-${v.id}">${(v.tags || []).map(t => `<span class="tag" style="background:${t.color || 'rgba(255,255,255,0.08)'}">${escapeHtml(t.name || t)}<button onclick="removeTag('${v.id}','music','${escapeHtml(t.name || t)}')">✖</button></span>`).join('')}</div>
            <div class="tag-input">
              <input type="text" placeholder="Nova tag" id="newtag-${v.id}">
              <button onclick="addTag('${v.id}','music')">+</button>
            </div>
            <div class="preset-tags">
              <div class="preset-btn" onclick="addPresetTag('${v.id}','music','Volunteer','rgba(245,158,11,0.2)')">Volunteer</div>
              <div class="preset-btn" onclick="addPresetTag('${v.id}','music','Localizer','rgba(0,168,107,0.2)')">Localizer</div>
              <div class="preset-btn" onclick="addPresetTag('${v.id}','music','Reviewer','rgba(229,57,53,0.2)')">Reviewer</div>
              <div class="preset-btn" onclick="showCustomTagInput('${v.id}','music')">Custom</div>
            </div>
            <div id="custom-tag-${v.id}" style="display:none" class="custom-tag-row">
              <input type="text" placeholder="Nome da tag" id="custom-name-${v.id}">
              <input type="color" id="custom-color-${v.id}" value="#6b7194">
              <button onclick="addCustomTag('${v.id}','music')">Add</button>
            </div>
            <div style="margin-top:0.8rem;"><strong>Letra / Tradução</strong></div>
            <textarea id="lyrics-${v.id}" rows="4" style="font-family:'DM Mono', monospace;">${escapeHtml(v.lyrics || '')}</textarea>
            <button class="save-btn btn-success" onclick="saveLyrics('${v.id}')">Salvar letra</button>
            <div class="status" id="status-${v.id}"></div>
          </div>
        `;
        container.appendChild(card);
      }
    } catch(e) {
      container.innerHTML = `<div class="state">Erro: ${e.message}</div>`;
    }
  }

  window.saveLyrics = async (id) => {
    const lyrics = document.getElementById(`lyrics-${id}`).value;
    const statusDiv = document.getElementById(`status-${id}`);
    statusDiv.innerText = 'Salvando...';
    try {
      const res = await fetch(`${WORKER_URL}/api/music/lyrics`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id, lyrics })
      });
      if (res.ok) {
        statusDiv.innerText = '✅ Salvo!';
        setTimeout(() => statusDiv.innerText = '', 2000);
      } else {
        statusDiv.innerText = '❌ Erro ao salvar';
      }
    } catch(e) {
      statusDiv.innerText = '❌ Erro de rede';
    }
  };

  // ========== JOGOS ==========
  async function loadGamesData() {
    const container = document.getElementById('games-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando jogos...</div>';
    try {
      const res = await fetch(`${WORKER_URL}/api/games?admin=true`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      const games = await res.json();
      if (!games.length) {
        container.innerHTML = '<div class="state">Nenhum jogo. Clique em "Adicionar novo jogo".</div>';
        return;
      }
      container.innerHTML = '';
      for (const game of games) {
        const tagsRes = await fetch(`${WORKER_URL}/api/games/tags?id=${game.appId}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        }).then(r => r.json()).catch(() => ({ tags: [] }));
        const creditsRes = await fetch(`${WORKER_URL}/api/game/credits?id=${game.appId}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        }).then(r => r.json()).catch(() => ({ creditsImage: '', creditsChips: [] }));

        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
          <div class="game-info">
            <div class="game-name">${escapeHtml(game.name)} <span style="font-size:0.7rem;opacity:0.7;">(${game.appId})</span></div>
            <div><strong>Papel (role):</strong> <input type="text" id="role-${game.appId}" value="${escapeHtml(game.role || '')}"></div>
            <div><strong>Nota (note):</strong> <input type="text" id="note-${game.appId}" value="${escapeHtml(game.note || '')}"></div>
            <div class="tags-area" id="tags-${game.appId}">${(tagsRes.tags || []).map(t => `<span class="tag" style="background:${t.color || 'rgba(255,255,255,0.08)'}">${escapeHtml(t.name || t)}<button onclick="removeTag('${game.appId}','game','${escapeHtml(t.name || t)}')">✖</button></span>`).join('')}</div>
            <div class="tag-input">
              <input type="text" placeholder="Nova tag" id="newtag-${game.appId}">
              <button onclick="addTag('${game.appId}','game')">+</button>
            </div>
            <div class="preset-tags">
              <div class="preset-btn" onclick="addPresetTag('${game.appId}','game','Volunteer','rgba(245,158,11,0.2)')">Volunteer</div>
              <div class="preset-btn" onclick="addPresetTag('${game.appId}','game','Localizer','rgba(0,168,107,0.2)')">Localizer</div>
              <div class="preset-btn" onclick="addPresetTag('${game.appId}','game','Reviewer','rgba(229,57,53,0.2)')">Reviewer</div>
              <div class="preset-btn" onclick="showCustomTagInput('${game.appId}','game')">Custom</div>
            </div>
            <div id="custom-tag-${game.appId}" style="display:none" class="custom-tag-row">
              <input type="text" placeholder="Nome da tag" id="custom-name-${game.appId}">
              <input type="color" id="custom-color-${game.appId}" value="#6b7194">
              <button onclick="addCustomTag('${game.appId}','game')">Add</button>
            </div>
            <div style="margin-top:0.8rem;"><strong>Prova de trabalho (créditos):</strong><br>
            <small>Formato: Nome|Papel (um por linha)</small></div>
            <textarea id="creditsChips-${game.appId}" rows="3" style="font-family:'DM Mono', monospace;">${(creditsRes.creditsChips || []).map(c => `${c.name}|${c.role || ''}`).join('\n')}</textarea>
            <div><strong>Ou imagem única (URL):</strong></div>
            <input type="text" id="creditsImage-${game.appId}" value="${escapeHtml(creditsRes.creditsImage || '')}" placeholder="https://exemplo.com/prova.jpg">
            <button class="save-btn btn-success" onclick="saveGameData('${game.appId}')">Salvar alterações</button>
            <button class="save-btn btn-danger" style="margin-top:0.3rem" onclick="deleteGame('${game.appId}')">Excluir jogo</button>
            <div class="status" id="status-${game.appId}"></div>
          </div>
        `;
        container.appendChild(card);
      }
    } catch(e) {
      container.innerHTML = `<div class="state">Erro: ${e.message}</div>`;
    }
  }

  window.saveGameData = async (appId) => {
    const statusDiv = document.getElementById(`status-${appId}`);
    statusDiv.innerText = 'Salvando...';
    const gameData = {
      appId,
      name: document.querySelector(`#games-list .game-card .game-name`)?.innerText.split(' (')[0] || appId,
      role: document.getElementById(`role-${appId}`).value,
      note: document.getElementById(`note-${appId}`).value,
    };
    try {
      const res = await fetch(`${WORKER_URL}/api/games`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify(gameData)
      });
      if (!res.ok) throw new Error();
      const creditsChips = document.getElementById(`creditsChips-${appId}`).value.split('\n').filter(l => l.trim()).map(line => {
        const [name, role] = line.split('|');
        return { name: name.trim(), role: role ? role.trim() : '' };
      });
      const creditsImage = document.getElementById(`creditsImage-${appId}`).value;
      await fetch(`${WORKER_URL}/api/game/credits`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id: appId, creditsImage, creditsChips })
      });
      statusDiv.innerText = '✅ Salvo!';
      setTimeout(() => statusDiv.innerText = '', 2000);
    } catch(e) {
      statusDiv.innerText = '❌ Erro ao salvar';
    }
  };

  window.deleteGame = async (appId) => {
    if (!confirm(`Excluir jogo ${appId}?`)) return;
    const statusDiv = document.getElementById(`status-${appId}`);
    statusDiv.innerText = 'Excluindo...';
    try {
      const res = await fetch(`${WORKER_URL}/api/games?appId=${appId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        loadGamesData();
      } else {
        statusDiv.innerText = '❌ Erro';
      }
    } catch(e) {
      statusDiv.innerText = '❌ Rede';
    }
  };

  // Modal para adicionar novo jogo
  document.getElementById('add-game-btn')?.addEventListener('click', () => {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>Adicionar novo jogo</h3>
        <input type="text" id="new-appid" placeholder="App ID (ex: 4178020)">
        <input type="text" id="new-name" placeholder="Nome do jogo">
        <div class="modal-buttons">
          <button id="cancel-add-game" class="btn-outline">Cancelar</button>
          <button id="confirm-add-game">Adicionar</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('confirm-add-game').onclick = async () => {
      const appId = document.getElementById('new-appid').value.trim();
      const name = document.getElementById('new-name').value.trim();
      if (!appId || !name) return alert('Preencha App ID e Nome');
      try {
        const res = await fetch(`${WORKER_URL}/api/games`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({ appId, name, role: '', note: '' })
        });
        if (res.ok) {
          modal.remove();
          loadGamesData();
        } else {
          alert('Erro ao adicionar');
        }
      } catch(e) {
        alert('Erro de rede');
      }
    };
    document.getElementById('cancel-add-game').onclick = () => modal.remove();
  });

  // ========== AUDIOVISUAIS (NOVA ABA) ==========
  async function loadAudiovisualsData() {
    const container = document.getElementById('audiovisuals-list');
    container.innerHTML = '<div class="state"><div class="spinner"></div>Carregando projetos...</div>';
    try {
      const res = await fetch(`${WORKER_URL}/api/audiovisuals?admin=true`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      const items = await res.json();
      if (!items.length) {
        container.innerHTML = '<div class="state">Nenhum projeto. Clique em "Novo projeto".</div>';
        return;
      }
      container.innerHTML = '';
      for (const item of items) {
        const tags = item.tags || [];
        const card = document.createElement('div');
        card.className = 'audiovisual-card';
        card.innerHTML = `
          ${item.thumbnail ? `<img class="audiovisual-thumb" src="${escapeHtml(item.thumbnail)}" alt="${escapeHtml(item.title)}">` : '<div class="audiovisual-thumb" style="background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:1.5rem;">🎬</div>'}
          <div class="audiovisual-info">
            <div class="audiovisual-title">${escapeHtml(item.title)} <span style="opacity:0.6;">(${item.id})</span></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
              <div><strong>Tipo:</strong> <input type="text" id="type-${item.id}" value="${escapeHtml(item.type || '')}"></div>
              <div><strong>Provider:</strong> 
                <select id="provider-${item.id}">
                  <option value="youtube" ${item.provider === 'youtube' ? 'selected' : ''}>YouTube</option>
                  <option value="vimeo" ${item.provider === 'vimeo' ? 'selected' : ''}>Vimeo</option>
                  <option value="other" ${item.provider === 'other' ? 'selected' : ''}>Outro</option>
                </select>
              </div>
              <div><strong>URL:</strong> <input type="text" id="url-${item.id}" value="${escapeHtml(item.url || '')}"></div>
              <div><strong>Thumbnail:</strong> <input type="text" id="thumbnail-${item.id}" value="${escapeHtml(item.thumbnail || '')}"></div>
              <div><strong>Papel:</strong> <input type="text" id="role-av-${item.id}" value="${escapeHtml(item.role || '')}"></div>
              <div><strong>Cliente:</strong> <input type="text" id="client-${item.id}" value="${escapeHtml(item.client || '')}"></div>
              <div><strong>Ano:</strong> <input type="text" id="year-${item.id}" value="${escapeHtml(item.year || '')}"></div>
              <div><strong>Duração:</strong> <input type="text" id="duration-${item.id}" value="${escapeHtml(item.duration || '')}"></div>
            </div>
            <div><strong>Descrição:</strong> <textarea id="description-${item.id}" rows="2">${escapeHtml(item.description || '')}</textarea></div>
            <div style="display:flex; align-items:center; gap:0.5rem; margin:0.5rem 0;">
              <label><strong>Publicado:</strong></label>
              <input type="checkbox" id="published-${item.id}" ${item.published !== false ? 'checked' : ''}>
              <label><strong>Destaque:</strong></label>
              <input type="checkbox" id="featured-${item.id}" ${item.featured ? 'checked' : ''}>
              <label><strong>Ordem:</strong></label>
              <input type="number" id="order-${item.id}" value="${item.order ?? 0}" style="width:70px; margin-bottom:0;">
            </div>
            <div class="tags-area" id="tags-av-${item.id}">${tags.map(t => `<span class="tag" style="background:${t.color || 'rgba(255,255,255,0.08)'}">${escapeHtml(t.name || t)}<button onclick="removeTag('${item.id}','audiovisual','${escapeHtml(t.name || t)}')">✖</button></span>`).join('')}</div>
            <div class="tag-input">
              <input type="text" placeholder="Nova tag" id="newtag-av-${item.id}">
              <button onclick="addTag('${item.id}','audiovisual')">+</button>
            </div>
            <div class="preset-tags">
              <div class="preset-btn" onclick="addPresetTag('${item.id}','audiovisual','Volunteer','rgba(245,158,11,0.2)')">Volunteer</div>
              <div class="preset-btn" onclick="addPresetTag('${item.id}','audiovisual','Localizer','rgba(0,168,107,0.2)')">Localizer</div>
              <div class="preset-btn" onclick="addPresetTag('${item.id}','audiovisual','Reviewer','rgba(229,57,53,0.2)')">Reviewer</div>
              <div class="preset-btn" onclick="showCustomTagInput('${item.id}','audiovisual')">Custom</div>
            </div>
            <div id="custom-tag-${item.id}" style="display:none" class="custom-tag-row">
              <input type="text" placeholder="Nome da tag" id="custom-name-${item.id}">
              <input type="color" id="custom-color-${item.id}" value="#6b7194">
              <button onclick="addCustomTag('${item.id}','audiovisual')">Add</button>
            </div>
            <div style="margin-top:1rem; display:flex; gap:0.5rem;">
              <button class="save-btn btn-success" onclick="saveAudiovisual('${item.id}')">Salvar</button>
              <button class="save-btn btn-danger" onclick="deleteAudiovisual('${item.id}')">Excluir</button>
            </div>
            <div class="status" id="status-av-${item.id}"></div>
          </div>
        `;
        container.appendChild(card);
      }
    } catch(e) {
      container.innerHTML = `<div class="state">Erro: ${e.message}</div>`;
    }
  }

  window.saveAudiovisual = async (id) => {
    const statusDiv = document.getElementById(`status-av-${id}`);
    statusDiv.innerText = 'Salvando...';
    const item = {
      id,
      title: document.querySelector(`#audiovisuals-list .audiovisual-title`).innerText.split(' (')[0],
      type: document.getElementById(`type-${id}`).value,
      provider: document.getElementById(`provider-${id}`).value,
      url: document.getElementById(`url-${id}`).value,
      thumbnail: document.getElementById(`thumbnail-${id}`).value,
      description: document.getElementById(`description-${id}`).value,
      role: document.getElementById(`role-av-${id}`).value,
      client: document.getElementById(`client-${id}`).value,
      year: document.getElementById(`year-${id}`).value,
      duration: document.getElementById(`duration-${id}`).value,
      published: document.getElementById(`published-${id}`).checked,
      featured: document.getElementById(`featured-${id}`).checked,
      order: parseInt(document.getElementById(`order-${id}`).value) || 0,
    };
    try {
      const res = await fetch(`${WORKER_URL}/api/audiovisuals`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify(item)
      });
      if (!res.ok) throw new Error();
      statusDiv.innerText = '✅ Salvo!';
      setTimeout(() => statusDiv.innerText = '', 2000);
    } catch(e) {
      statusDiv.innerText = '❌ Erro';
    }
  };

  window.deleteAudiovisual = async (id) => {
    if (!confirm(`Excluir projeto ${id}?`)) return;
    const statusDiv = document.getElementById(`status-av-${id}`);
    statusDiv.innerText = 'Excluindo...';
    try {
      const res = await fetch(`${WORKER_URL}/api/audiovisuals?id=${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        loadAudiovisualsData();
      } else {
        statusDiv.innerText = '❌ Erro';
      }
    } catch(e) {
      statusDiv.innerText = '❌ Rede';
    }
  };

  // Modal para adicionar novo projeto audiovisual
  document.getElementById('add-audiovisual-btn')?.addEventListener('click', () => {
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>Novo projeto audiovisual</h3>
        <input type="text" id="new-av-title" placeholder="Título do projeto">
        <input type="text" id="new-av-url" placeholder="URL do vídeo (YouTube/Vimeo/etc)">
        <div class="modal-buttons">
          <button id="cancel-add-av" class="btn-outline">Cancelar</button>
          <button id="confirm-add-av">Criar</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('confirm-add-av').onclick = async () => {
      const title = document.getElementById('new-av-title').value.trim();
      const url = document.getElementById('new-av-url').value.trim();
      if (!title) return alert('Título obrigatório');
      try {
        const res = await fetch(`${WORKER_URL}/api/audiovisuals`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({ title, url, type: '', provider: 'youtube' })
        });
        if (res.ok) {
          modal.remove();
          loadAudiovisualsData();
        } else {
          alert('Erro ao criar');
        }
      } catch(e) {
        alert('Erro de rede');
      }
    };
    document.getElementById('cancel-add-av').onclick = () => modal.remove();
  });

  // ========== TAGS (genérico) ==========
  window.addPresetTag = async (id, type, name, color) => {
    await addTagObject(id, type, { name, color });
  };
  window.showCustomTagInput = (id, type) => {
    const div = document.getElementById(`custom-tag-${id}`);
    if (div) div.style.display = div.style.display === 'none' ? 'flex' : 'none';
  };
  window.addCustomTag = async (id, type) => {
    const name = document.getElementById(`custom-name-${id}`).value.trim();
    const color = document.getElementById(`custom-color-${id}`).value;
    if (!name) return;
    await addTagObject(id, type, { name, color });
    document.getElementById(`custom-name-${id}`).value = '';
    document.getElementById(`custom-tag-${id}`).style.display = 'none';
  };
  window.addTag = async (id, type) => {
    const input = document.getElementById(`newtag-${id}`) || document.getElementById(`newtag-av-${id}`);
    const tagName = input.value.trim();
    if (!tagName) return;
    await addTagObject(id, type, { name: tagName, color: 'rgba(255,255,255,0.08)' });
    input.value = '';
  };
  window.addTagObject = async (id, type, tagObj) => {
    let endpoint;
    if (type === 'music') endpoint = '/api/music/tags';
    else if (type === 'game') endpoint = '/api/games/tags';
    else if (type === 'audiovisual') endpoint = '/api/audiovisuals/tags';
    else return;
    try {
      const res = await fetch(`${WORKER_URL}${endpoint}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${authToken}`
        },
        body: JSON.stringify({ id, tag: tagObj })
      });
      if (res.ok) {
        if (type === 'music') loadMusicData();
        else if (type === 'game') loadGamesData();
        else if (type === 'audiovisual') loadAudiovisualsData();
      } else {
        alert('Erro ao adicionar tag');
      }
    } catch(e) {
      alert('Rede');
    }
  };
  window.removeTag = async (id, type, tagName) => {
    let endpoint;
    if (type === 'music') endpoint = '/api/music/tags';
    else if (type === 'game') endpoint = '/api/games/tags';
    else if (type === 'audiovisual') endpoint = '/api/audiovisuals/tags';
    else return;
    try {
      const res = await fetch(`${WORKER_URL}${endpoint}?id=${id}&tag=${encodeURIComponent(tagName)}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      if (res.ok) {
        if (type === 'music') loadMusicData();
        else if (type === 'game') loadGamesData();
        else if (type === 'audiovisual') loadAudiovisualsData();
      } else {
        alert('Erro ao remover tag');
      }
    } catch(e) {
      alert('Rede');
    }
  };

  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
  }
</script>
</body>
</html>
